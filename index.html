// ── Battle logic ───────────────────────────────────────────────────────────
function computeBattle(effort, gs) {
  let rate = effort === "allout" ? 0.8 : 0.2;
  if (gs.battleWeapon && gs.weapon) {
    rate += gs.battleWeapon === gs.weapon ? 0.1 : -0.05;
  }
  rate = Math.max(0.05, Math.min(0.95, rate));
  if (effort === "allout" && gs.allOutGuaranteeNext) return true;
  if (effort === "conserve" && gs.conserveFailNext) return false;
  return Math.random() < rate;
}
function battleEffects(effort, success, gs) {
  const e = {
    assimilation: success ? 20 : 30,
    mapProgress: success ? 20 : -10,
    allOutGuaranteeNext: effort === "allout" && !success,
    conserveFailNext: effort === "conserve" && success,
    conserveCount: effort === "conserve" ? gs.conserveCount + 1 : gs.conserveCount,
    failCount: !success ? gs.failCount + 1 : gs.failCount,
    lastBattleResult: success ? "success" : "fail",
  };
  return e;
}

// ── Game state ─────────────────────────────────────────────────────────────
const initGame = {
  assimilation: 0, mapProgress: 20, weapon: null, day: 1, breadToday: false,
  battleDay: 0, battleWeapon: null,
  allOutGuaranteeNext: false, conserveFailNext: false,
  conserveCount: 0, failCount: 0,
  lastBattleResult: null,
  restCount: 0, seenNamesEvent: false,
};
function gr(state, eff) {
  if (!eff) return state;
  if (eff._reset) return { ...initGame };
  const s = { ...state };
  if (eff.assimilation  !== undefined) s.assimilation  = Math.min(100, Math.max(0, s.assimilation + eff.assimilation));
  if (eff.mapProgress   !== undefined) s.mapProgress   = Math.min(100, Math.max(0, s.mapProgress  + eff.mapProgress));
  if (eff.weapon        !== undefined) s.weapon        = eff.weapon;
  if (eff.day           !== undefined) s.day           = eff.day;
  if (eff.breadToday    !== undefined) s.breadToday    = eff.breadToday;
  if (eff.breadReset)                   s.breadToday   = false;
  if (eff.battleDay     !== undefined) s.battleDay     = eff.battleDay;
  if (eff.battleWeapon  !== undefined) s.battleWeapon  = eff.battleWeapon;
  if (eff.allOutGuaranteeNext !== undefined) s.allOutGuaranteeNext = eff.allOutGuaranteeNext;
  if (eff.conserveFailNext    !== undefined) s.conserveFailNext    = eff.conserveFailNext;
  if (eff.conserveCount !== undefined) s.conserveCount = eff.conserveCount;
  if (eff.failCount     !== undefined) s.failCount     = eff.failCount;
  if (eff.lastBattleResult !== undefined) s.lastBattleResult = eff.lastBattleResult;
  if (eff.restCount !== undefined) s.restCount = eff.restCount;
  if (eff.seenNamesEvent !== undefined) s.seenNamesEvent = eff.seenNamesEvent;
  return s;
}

// ── Helper text functions ──────────────────────────────────────────────────
const breadSkipText = (gs) => {
  const v = gs.assimilation;
  if (v <= 20) return "你不想吃麵包，拒絕了店長，店長看著你的手，並沒有說什麼。";
  if (v <= 40) return "你拒絕了店長，店長的視線落在你的小臂上，終究沒有開口。";
  if (v <= 60) return "你拒絕了店長，店長開口勸了勸你，你依舊不願吃，店長看著你的手臂，有些喪氣的走了。";
  if (v <= 80) return "你拒絕了店長，店長想伸手觸碰你異化成黑色的手臂，但終究收了回去，見你堅持，店長便離開了。";
  return "店長的態度比往常強硬，但你仍舊堅持不吃，店長看起來有些難過，他摸了摸你的頭，看了你很久，最後轉身走了。";
};

const getRestEvent = (gs) => {
  const mp = gs.mapProgress;
  const rc = gs.restCount || 0;
  if (mp <= 20) return rc % 2 === 0 ? "event_landlord" : "event_clients";

  if (mp <= 80) return (rc % 2 === 0 || !gs.seenNamesEvent) ? "event_assimilation" : "event_training";
  return rc % 2 === 0 ? "event_party" : "event_landlord_talk";
};

};

  ending_assimilation:{ title:"結局二：融為一體",sub:"（異化）", color:"#0a040a", accent:"#6d28d9" },
};
const SPEAKER_CLR = {"你":"#93c5fd","店長":"#fbbf24","店員":"#f87171"};
const SPEAKER_BG  = {"你":"rgba(30,60,120,.72)","店長":"rgba(110,65,0,.72)","店員":"rgba(110,30,30,.72)"};
const BG = {
  street:"linear-gradient(180deg,#1c1c2e 0%,#2a2a40 50%,#161622 100%)",
  yard:"linear-gradient(180deg,#162016 0%,#243024 60%,#121812 100%)",
  bus:"linear-gradient(180deg,#14141e 0%,#1e1e2e 60%,#0e0e16 100%)",
  dark_street:"linear-gradient(180deg,#08080e 0%,#10101a 60%,#040408 100%)",
  dark_total:"radial-gradient(ellipse at center,#160826 0%,#06020e 70%,#000 100%)",
  throne:"radial-gradient(ellipse at 50% 20%,#2a0a4e 0%,#08021a 60%,#000 100%)",
  bakery:"linear-gradient(180deg,#18100a 0%,#24180e 60%,#140e08 100%)",
  room:"linear-gradient(180deg,#0c0c1a 0%,#161626 60%,#0c0c18 100%)",
  workroom:"linear-gradient(180deg,#0a0e0a 0%,#121a12 60%,#08100a 100%)",
  room_night:"linear-gradient(180deg,#04040a 0%,#080810 60%,#020206 100%)",
};
const GLOW = {
  dark_street:"radial-gradient(ellipse at 75% 55%,rgba(240,180,60,.10) 0%,transparent 45%)",
  dark_total:"radial-gradient(ellipse at center,rgba(100,30,180,.12) 0%,transparent 60%)",
  throne:"radial-gradient(ellipse at 50% 30%,rgba(140,50,220,.20) 0%,transparent 55%)",
  bakery:"radial-gradient(ellipse at 50% 25%,rgba(255,200,100,.13) 0%,transparent 55%)",
  workroom:"radial-gradient(ellipse at 40% 40%,rgba(60,160,60,.07) 0%,transparent 50%)",
};
const WALK_TO = new Set(["yard","bus","to_dark","bakery","comp1","comp1f","day2_start","day3_morning","day3_yard","day4_morning","day4_conv","day5_morning","day5_school","day6_morning","day6_cross","day7_depart","rejoin"]);
const WARM_BG = new Set(["bakery","room","workroom","room_night"]);
const DARK_CH = [["D2","A2"],["F2","C3"],["Bb1","F2"],["A1","E2"]];
const WARM_CH = [["F3","A3","C4"],["G3","B3"],["A3","C4","E4"],["E3","G3","B3"]];

// ── Audio ──────────────────────────────────────────────────────────────────
const A={ok:false,loading:false,muted:false,warm:false,foot:null,bell1:null,bell2:null,pad:null,stickyOsc:null,stickyGain:null,stickyLfo:null,bgTimer:null,bgIdx:0};
async function audioInit(){
  if(A.ok||A.loading)return; A.loading=true;
  try{
    await Tone.start();
    A.foot=new Tone.MembraneSynth({pitchDecay:.07,octaves:4,envelope:{attack:.001,decay:.13,sustain:0,release:.05}}).toDestination(); A.foot.volume.value=-5;
    const bRev=new Tone.Reverb({decay:4.5,wet:.65}); await bRev.generate(); bRev.toDestination();
    A.bell1=new Tone.Synth({oscillator:{type:"sine"},envelope:{attack:.001,decay:2.6,sustain:0,release:.6}}).connect(bRev); A.bell1.volume.value=-2;
    A.bell2=new Tone.Synth({oscillator:{type:"sine"},envelope:{attack:.001,decay:1.9,sustain:0,release:.5}}).connect(bRev); A.bell2.volume.value=-7;
    const sRev=new Tone.Reverb({decay:9,wet:.78}); await sRev.generate();
    const sDist=new Tone.Distortion({distortion:.6,wet:.5});
    A.stickyGain=new Tone.Gain(0); A.stickyOsc=new Tone.Oscillator({frequency:36,type:"sawtooth"});
    A.stickyLfo=new Tone.LFO({frequency:.16,min:.4,max:1.0}); A.stickyLfo.connect(A.stickyGain.gain);
    A.stickyOsc.connect(sDist).connect(A.stickyGain).connect(sRev); A.stickyLfo.start();
    const pRev=new Tone.Reverb({decay:12,wet:.85}); await pRev.generate();
    A.pad=new Tone.PolySynth(Tone.Synth,{oscillator:{type:"sine"},envelope:{attack:3.2,decay:.5,sustain:.7,release:9}}).connect(pRev); A.pad.volume.value=-10;
    A.ok=true; bgLoop();
  }catch(e){console.warn(e);}
  A.loading=false;
}
function bgLoop(){if(A.bgTimer)return;const tick=()=>{if(A.ok&&!A.muted){const ch=A.warm?WARM_CH:DARK_CH;try{A.pad.triggerAttackRelease(ch[A.bgIdx%ch.length],"2n");}catch{}A.bgIdx++;}A.bgTimer=setTimeout(tick,5200);};tick();}
function sfxFoot(n=5){if(!A.ok||A.muted)return;const t=Tone.now();for(let i=0;i<n;i++)try{A.foot.triggerAttackRelease(i%2===0?"C1":"A0","32n",t+i*.38);}catch{}}
function sfxBell(){if(!A.ok||A.muted)return;try{A.bell1.triggerAttackRelease("C6","16n",Tone.now());A.bell2.triggerAttackRelease("G5","16n",Tone.now()+.045);}catch{}setTimeout(()=>{try{A.bell1.triggerAttackRelease("A5","16n",Tone.now());A.bell2.triggerAttackRelease("E5","16n",Tone.now()+.045);}catch{}},920);}
function sfxStickyStart(){if(!A.ok||A.muted||!A.stickyOsc)return;try{A.stickyOsc.start();A.stickyGain.gain.rampTo(1,3.5);}catch{}}
function sfxStickyStop(){if(!A.stickyOsc)return;try{A.stickyGain.gain.rampTo(0,1.5);setTimeout(()=>{try{A.stickyOsc.stop();}catch{}},2000);}catch{}}

// ── Particles ──────────────────────────────────────────────────────────────
function Particles({bg}){
  if(!["dark_total","throne"].includes(bg))return null;
  return(<div style={{position:"absolute",inset:0,overflow:"hidden",pointerEvents:"none"}}>{Array.from({length:20}).map((_,i)=>(<div key={i} style={{position:"absolute",width:1+(i%3),height:1+(i%3),borderRadius:"50%",background:`rgba(${130+i*5%80},${40+i*3%40},${200+i%55},${.25+(i%5)*.1})`,left:(i*17+5)%100+"%",top:(i*13+10)%100+"%",animation:`floatPart ${5+(i%6)}s linear ${(i*.7)%8}s infinite`}}/>))}</div>);
}

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const [sceneId,  setSceneId]  = useState("intro");
  const [lineIdx,  setLineIdx]  = useState(0);
  const [curTxt,   setCurTxt]   = useState("");
  const [displayed,setDisplayed]= useState("");
  const [textDone, setTextDone] = useState(false);
  const [fading,   setFading]   = useState(false);
  const [history,  setHistory]  = useState([]);
  const [ending,   setEnding]   = useState(null);
  const [menuOpen, setMenuOpen] = useState(false);
  const [muted,    setMuted]    = useState(false);
  const [gs, dispatch] = useReducer(gr, initGame);
  const typeRef=useRef(null); const idleRef=useRef(null);

  const scene    = S[sceneId];
  const curLine  = scene?.lines[lineIdx];
  const prevLine = lineIdx>0 ? scene?.lines[lineIdx-1] : null;
  const isLast   = scene && lineIdx===scene.lines.length-1;
  const showCh   = isLast && textDone && scene.choices.length>0;
  const isSingle = scene?.choices.length===1;

  // assimilation 100 check
  useEffect(()=>{ if(gs.assimilation>=100 && !ending) setEnding("ending_assimilation"); },[gs.assimilation]);
  // bg music
  useEffect(()=>{ if(scene) A.warm=WARM_BG.has(scene.bg); },[sceneId]);

  // typewriter
  useEffect(()=>{
    if(!scene)return;
    clearInterval(typeRef.current); clearTimeout(idleRef.current);
    const line=scene.lines[lineIdx];
    const txt = line?.textFn ? line.textFn(gs) : (line?.text||"");
    setCurTxt(txt); setDisplayed(""); setTextDone(false);
    if(lineIdx===0){
      if(scene.sfx==="sticky") sfxStickyStart(); else sfxStickyStop();
      if(scene.sfx==="bell") setTimeout(sfxBell,320);
    }
    let i=0;
    typeRef.current=setInterval(()=>{ if(i<txt.length) setDisplayed(txt.slice(0,++i)); else{clearInterval(typeRef.current);setTextDone(true);}},28);
    return()=>clearInterval(typeRef.current);
  },[sceneId,lineIdx]);

  // idle timer
  useEffect(()=>{
    clearTimeout(idleRef.current);
    if(scene?.idleNext&&isLast&&textDone) idleRef.current=setTimeout(()=>advance(scene.idleNext),scene.idleDelay||12000);
    return()=>clearTimeout(idleRef.current);
  },[sceneId,lineIdx,textDone]);

  const advance=(nextId,eff)=>{
    audioInit(); if(eff) dispatch(eff);
    clearTimeout(idleRef.current);
    if(WALK_TO.has(nextId)) sfxFoot(5);
    setFading(true);
    setTimeout(()=>{ setHistory(h=>[...h,{sceneId,lineIdx}]); setLineIdx(0); setSceneId(nextId); setFading(false); },360);
  };

  const handleClick=()=>{
    if(!textDone){clearInterval(typeRef.current);setDisplayed(curTxt);setTextDone(true);return;}
    if(curLine?.prompt) return;
    if(!isLast) setLineIdx(i=>i+1);
    else if(!scene.choices.length&&scene.ending){sfxStickyStop();setEnding(scene.ending);}
  };
  const handlePrompt=()=>{
    if(curLine?.effect) dispatch(curLine.effect);
    if(!isLast) setLineIdx(i=>i+1);
    else if(!scene.choices.length&&scene.ending){sfxStickyStop();setEnding(scene.ending);}
  };
  const handleChoice=(c)=>{
    if(c.doBattle){
      const success=computeBattle(c.doBattle,gs);
      const eff=battleEffects(c.doBattle,success,gs);
      dispatch(eff);
      const base=c.doBattle==="allout"?"combat_allout":"combat_conserve";
      advance(`${base}_${success?"s":"f"}`);
      return;
    }
    const nextId=c.nextFn?c.nextFn(gs):c.next;
    const eff=c.effectFn?c.effectFn(gs):c.effect;
    advance(nextId,eff);
  };

  const toggleMute=()=>{A.muted=!A.muted;if(A.muted){try{A.pad?.releaseAll();sfxStickyStop();}catch{}}setMuted(A.muted);};
  const restart=()=>{sfxStickyStop();setEnding(null);setSceneId("intro");setLineIdx(0);setHistory([]);setMenuOpen(false);dispatch({_reset:true});};
  const goBack=()=>{if(!history.length)return;sfxStickyStop();const p=history[history.length-1];setHistory(h=>h.slice(0,-1));setLineIdx(p.lineIdx);setSceneId(p.sceneId);setMenuOpen(false);};

  const assiStage=(v)=>{ if(v<=0)return""; if(v<=20)return"手掌、腳掌"; if(v<=40)return"手臂前段、小腿"; if(v<=60)return"手臂後段、大腿"; if(v<=80)return"軀幹"; return"頭"; };
  const assiClr=(v)=>v===0?"rgba(255,255,255,.3)":v<40?"rgba(250,220,80,.7)":v<70?"rgba(240,130,60,.8)":"rgba(220,60,60,.9)";

  if(ending){
    const e=ENDINGS[ending]||ENDINGS.ending_1;
    return(
      <div style={{minHeight:"100dvh",background:e.color,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2.5rem 1.5rem",fontFamily:"'Noto Serif TC','Georgia',serif"}}>
        <style>{`@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&display=swap');`}</style>
        <div style={{width:1,height:56,background:e.accent,opacity:.6,marginBottom:"2rem"}}/>
        <div style={{fontSize:"clamp(1rem,4vw,1.4rem)",color:e.accent,letterSpacing:".2em",textAlign:"center",marginBottom:".6rem"}}>{e.title}</div>
        {e.sub&&<div style={{fontSize:".75rem",color:e.accent+"99",letterSpacing:".15em",marginBottom:"2rem"}}>{e.sub}</div>}
        <div style={{fontSize:".7rem",color:"rgba(255,255,255,.25)",letterSpacing:".1em",marginTop:".5rem"}}>
          異化值 {gs.assimilation}/100{assiStage(gs.assimilation)?` · ${assiStage(gs.assimilation)}`:""}{gs.weapon?` · 擅長${gs.weapon==="gun"?"槍":"長刀"}`:""}{` · 探索度 ${gs.mapProgress}%`}
        </div>
        <button onClick={restart} style={{marginTop:"1.5rem",background:"transparent",border:`1px solid ${e.accent}55`,color:e.accent+"bb",padding:".65rem 2.2rem",fontSize:".8rem",letterSpacing:".2em",cursor:"pointer",fontFamily:"inherit"}}>再次開始</button>
      </div>
    );
  }
  if(!scene)return null;

  return(
    <div className="vn-root" style={{background:BG[scene.bg]||BG.street,opacity:fading?0:1,transition:"opacity .36s ease"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        .vn-root{display:flex;flex-direction:column;min-height:100dvh;font-family:'Noto Serif TC','Georgia',serif;overflow:hidden;position:relative;}
        @media(orientation:landscape)and(min-width:500px){
          .vn-root{flex-direction:row;}
          .vn-scene{flex:0 0 44%;}
          .vn-ui{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:1.2rem 1.4rem 1.4rem;}
        }
        .vn-scene{flex:1;position:relative;min-height:28vh;}
        .vn-ui{padding:0 1rem 1rem;}
        .opt{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:4px;color:rgba(218,212,200,.88);padding:.65rem 1.1rem;text-align:left;cursor:pointer;font-size:clamp(.75rem,2.2vw,.88rem);letter-spacing:.04em;line-height:1.65;font-family:inherit;transition:all .2s ease;width:100%;}
        .opt:hover{background:rgba(255,255,255,.10);transform:translateX(3px);}
        .prompt-btn{display:inline-block;background:transparent;border:1px solid rgba(255,255,255,.18);border-radius:3px;color:rgba(200,195,185,.75);padding:.35rem 1rem;font-size:clamp(.72rem,2vw,.82rem);letter-spacing:.1em;cursor:pointer;font-family:inherit;transition:all .2s ease;margin-top:.6rem;}
        .prompt-btn:hover{background:rgba(255,255,255,.07);color:rgba(220,215,205,.9);}
        .single-btn{display:inline-block;background:transparent;border:1px solid rgba(255,255,255,.18);border-radius:3px;color:rgba(200,195,185,.75);padding:.35rem 1.1rem;font-size:clamp(.72rem,2vw,.82rem);letter-spacing:.1em;cursor:pointer;font-family:inherit;transition:all .2s ease;margin-top:.6rem;}
        .single-btn:hover{background:rgba(255,255,255,.07);}
        @keyframes floatPart{0%{transform:translateY(0) scale(1);opacity:0}15%{opacity:.8}85%{opacity:.3}100%{transform:translateY(-100px) scale(.4);opacity:0}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes blink{0%,100%{opacity:.15}50%{opacity:.85}}
        @keyframes lineIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
      `}</style>

      <div className="vn-scene">
        {GLOW[scene.bg]&&<div style={{position:"absolute",inset:0,background:GLOW[scene.bg],pointerEvents:"none"}}/>}
        <Particles bg={scene.bg}/>
        <div style={{position:"absolute",bottom:"1rem",left:"1rem",right:"1rem",pointerEvents:"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:".6rem"}}>
            <span style={{fontSize:".56rem",color:"rgba(255,255,255,.28)",letterSpacing:".12em",whiteSpace:"nowrap"}}>第 {gs.day} 天</span>
            <div style={{flex:1,height:3,background:"rgba(255,255,255,.08)",borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${gs.assimilation}%`,background:assiClr(gs.assimilation),transition:"width .6s ease"}}/>
            </div>
            <span style={{fontSize:".56rem",letterSpacing:".08em",color:assiClr(gs.assimilation),whiteSpace:"nowrap"}}>異化 {gs.assimilation}</span>
          </div>
          {assiStage(gs.assimilation)&&<div style={{fontSize:".5rem",color:"rgba(200,140,80,.4)",letterSpacing:".1em",textAlign:"right",marginTop:".15rem"}}>{assiStage(gs.assimilation)}</div>}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:".2rem"}}>
            {gs.weapon&&<span style={{fontSize:".5rem",color:"rgba(180,180,180,.3)",letterSpacing:".1em"}}>擅長 {gs.weapon==="gun"?"槍":"長刀"}</span>}
            <span style={{fontSize:".5rem",color:"rgba(180,180,180,.3)",letterSpacing:".08em",marginLeft:"auto"}}>探索度 {gs.mapProgress}%</span>
          </div>
        </div>
      </div>

      <div style={{position:"absolute",top:0,left:0,right:0,zIndex:20,display:"flex",justifyContent:"space-between",alignItems:"center",padding:".8rem 1.2rem"}}>
        <span style={{fontSize:".58rem",color:"rgba(255,255,255,.2)",letterSpacing:".3em"}}>麵包店</span>
        <div style={{display:"flex",gap:".4rem"}}>
          <button onClick={toggleMute} style={{background:"none",border:"none",color:"rgba(255,255,255,.28)",fontSize:".85rem",cursor:"pointer",padding:".2rem .3rem"}}>{muted?"🔇":"🔊"}</button>
          <button onClick={()=>setMenuOpen(m=>!m)} style={{background:"none",border:"none",color:"rgba(255,255,255,.32)",fontSize:"1.1rem",cursor:"pointer",padding:".2rem .4rem"}}>≡</button>
        </div>
      </div>

      {menuOpen&&(
        <div style={{position:"absolute",top:"3rem",right:"1rem",zIndex:100,background:"rgba(6,6,14,.97)",border:"1px solid rgba(255,255,255,.08)",borderRadius:4,overflow:"hidden",minWidth:110}}>
          {history.length>0&&<button onClick={goBack} style={{display:"block",width:"100%",background:"none",border:"none",borderBottom:"1px solid rgba(255,255,255,.06)",color:"rgba(255,255,255,.6)",padding:".6rem 1rem",textAlign:"left",fontSize:".78rem",letterSpacing:".08em",cursor:"pointer",fontFamily:"inherit"}}>← 返回</button>}
          <button onClick={restart} style={{display:"block",width:"100%",background:"none",border:"none",borderBottom:"1px solid rgba(255,255,255,.06)",color:"rgba(255,255,255,.6)",padding:".6rem 1rem",textAlign:"left",fontSize:".78rem",letterSpacing:".08em",cursor:"pointer",fontFamily:"inherit"}}>↺ 重新開始</button>
          <button onClick={()=>setMenuOpen(false)} style={{display:"block",width:"100%",background:"none",border:"none",color:"rgba(255,255,255,.25)",padding:".6rem 1rem",textAlign:"left",fontSize:".78rem",letterSpacing:".08em",cursor:"pointer",fontFamily:"inherit"}}>關閉</button>
        </div>
      )}

      <div className="vn-ui">
        {prevLine&&(
          <div style={{marginBottom:".4rem",padding:".55rem .9rem",opacity:.28,fontSize:"clamp(.7rem,1.9vw,.78rem)",color:"rgba(210,205,195,.9)",lineHeight:1.7,letterSpacing:".04em",borderLeft:"1px solid rgba(255,255,255,.07)",paddingLeft:".85rem"}}>
            {prevLine.speaker&&<span style={{fontSize:".62rem",color:SPEAKER_CLR[prevLine.speaker]+"88",letterSpacing:".12em",marginRight:".45rem"}}>{prevLine.speaker}</span>}
            {prevLine.textFn?prevLine.textFn(gs):(prevLine.text||"")}
          </div>
        )}

        <div onClick={handleClick} style={{position:"relative",background:"rgba(6,6,14,.92)",border:"1px solid rgba(255,255,255,.08)",borderRadius:5,padding:"1.1rem 1.2rem",paddingTop:curLine?.speaker?"1.5rem":"1.1rem",cursor:(!textDone||(!curLine?.prompt&&!isLast)||(!curLine?.prompt&&isLast&&!scene.choices.length&&scene.ending))?"pointer":"default",backdropFilter:"blur(10px)",animation:"lineIn .25s ease"}}>
          {curLine?.speaker&&(
            <div style={{position:"absolute",top:"-.05rem",left:"1rem",transform:"translateY(-100%)",background:SPEAKER_BG[curLine.speaker],color:SPEAKER_CLR[curLine.speaker],fontSize:".72rem",letterSpacing:".14em",padding:".2rem .75rem .22rem",borderRadius:"3px 3px 0 0",fontWeight:600}}>
              {curLine.speaker}
            </div>
          )}
          <div style={{color:"rgba(228,222,210,.92)",lineHeight:1.95,fontSize:"clamp(.82rem,2.3vw,.92rem)",letterSpacing:".04em",whiteSpace:"pre-wrap",minHeight:"2.8rem"}}>
            {displayed}
            {!textDone&&<span style={{display:"inline-block",width:1,height:"1em",background:"rgba(255,255,255,.5)",verticalAlign:"text-bottom",marginLeft:1,animation:"blink .9s ease-in-out infinite"}}/>}
          </div>
          {textDone&&curLine?.prompt&&!isLast&&(
            <div><button className="prompt-btn" onClick={e=>{e.stopPropagation();handlePrompt();}}>【{curLine.prompt}】</button></div>
          )}
          {textDone&&!curLine?.prompt&&!isLast&&(
            <span style={{position:"absolute",bottom:".65rem",right:".9rem",fontSize:".58rem",color:"rgba(255,255,255,.2)",animation:"blink 1.8s ease-in-out infinite"}}>▼</span>
          )}
          {textDone&&isLast&&!scene.choices.length&&(
            <span style={{position:"absolute",bottom:".65rem",right:".9rem",fontSize:".58rem",color:"rgba(255,255,255,.2)",animation:"blink 1.8s ease-in-out infinite"}}>▼</span>
          )}
        </div>

        {showCh&&(
          <div style={{marginTop:".5rem",display:"flex",flexDirection:"column",gap:".45rem",animation:"fadeUp .3s ease"}}>
            {isSingle
              ?<div><button className="single-btn" onClick={()=>handleChoice(scene.choices[0])}>【{scene.choices[0].label}】</button></div>
              :scene.choices.map((c,i)=><button key={i} className="opt" onClick={()=>handleChoice(c)}>{c.label}</button>)
            }
          </div>
        )}
      </div>
    </div>
  );
}


    const _root = ReactDOM.createRoot(document.getElementById('root'));
    _root.render(<App />);
  </script>
</body>
</html>
